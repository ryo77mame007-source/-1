name: Daily Aquaculture News Digest

on:
  schedule:
    # 22:00 UTC = 07:00 JST (Japan Standard Time = UTC+9)
    - cron: "0 22 * * *"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "テスト実行（メール送信をスキップ）"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

jobs:
  send-digest:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run digest (dry run)
        if: github.event.inputs.dry_run == 'true'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          RESEND_API_KEY: "dummy"
          TO_EMAIL: "dummy@example.com"
        run: |
          python - <<'EOF'
          import os
          os.environ["RESEND_API_KEY"] = "dummy"
          import sys
          sys.path.insert(0, ".")
          from digest import fetch_articles, generate_digest, build_html_email
          print("📡 記事収集中...")
          articles = fetch_articles()
          print(f"✅ {len(articles)} 件収集")
          print("🤖 ダイジェスト生成中...")
          data = generate_digest(articles)
          html = build_html_email(data)
          print(f"✅ {len(data.get('articles',[]))} 件のダイジェスト生成完了")
          print("--- イントロ ---")
          print(data.get("intro"))
          for a in data.get("articles", []):
              print(f"\n[{a['category']}] {a['title']}")
          print("\n✅ ドライラン完了（メール未送信）")
          EOF

      - name: Send digest
        if: github.event.inputs.dry_run != 'true'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          TO_EMAIL: ${{ secrets.TO_EMAIL }}
          FROM_EMAIL: ${{ secrets.FROM_EMAIL }}
        run: python digest.py
